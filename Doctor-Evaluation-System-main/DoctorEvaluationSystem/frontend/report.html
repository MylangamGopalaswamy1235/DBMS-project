<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Report</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav>
        <h1>Doctor Evaluation System</h1>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="feedback.html">Submit Feedback</a>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
    </nav>
    <div class="container">
        <div class="card">
            <h2 id="doctorNameTitle">Doctor Report</h2>
            <div id="statsContainer" style="display: flex; gap: 2rem; margin: 1.5rem 0;">
                <div style="background: var(--bg-color); padding: 1.5rem; border-radius: 8px; flex: 1;">
                    <h3 style="color: var(--text-muted); font-size: 1rem;">Total Reviews</h3>
                    <p id="totalReview" style="font-size: 2rem; font-weight: 700; color: var(--primary);">0</p>
                </div>
                <div style="background: var(--bg-color); padding: 1.5rem; border-radius: 8px; flex: 1;">
                    <h3 style="color: var(--text-muted); font-size: 1rem;">Average Rating</h3>
                    <p id="avgRating" style="font-size: 2rem; font-weight: 700; color: var(--success);">0.0 / 5</p>
                </div>
            </div>
            
            <div style="max-width: 500px; margin: 2rem auto;">
                <canvas id="ratingChart"></canvas>
            </div>

            <h3 style="margin-top: 2rem; margin-bottom: 1rem;">Recent Feedback</h3>
            <div class="table-wrapper">
                <table id="feedbackTable">
                    <thead>
                        <tr>
                            <th>Patient</th>
                            <th>Rating</th>
                            <th>Treatment Result</th>
                            <th>Comments</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initApp();
            const urlParams = new URLSearchParams(window.location.search);
            const doctorId = urlParams.get('id');
            if(doctorId) {
                fetchReport(doctorId);
            } else {
                alert("No doctor ID provided.");
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
