<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Feedback</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h1>Doctor Evaluation System</h1>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="feedback.html">Submit Feedback</a>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
    </nav>
    <div class="container">
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <h2>Submit Patient Feedback</h2>
            <form id="feedbackForm" style="margin-top: 1.5rem;">
                <div class="form-group">
                    <label for="patient_name">Patient Name</label>
                    <input type="text" id="patient_name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="patient_contact">Patient Contact</label>
                    <input type="text" id="patient_contact" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="doctor_id">Select Doctor</label>
                    <select id="doctor_id" class="form-control" required>
                        <option value="">-- Loading Doctors --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="rating">Rating (1 to 5)</label>
                    <input type="number" id="rating" class="form-control" min="1" max="5" required>
                </div>
                <div class="form-group">
                    <label for="treatment_result">Treatment Result</label>
                    <input type="text" id="treatment_result" class="form-control" placeholder="e.g. Cured, Improved, No Change" required>
                </div>
                <div class="form-group">
                    <label for="comments">Comments</label>
                    <textarea id="comments" class="form-control" rows="4"></textarea>
                </div>
                <button type="submit" class="btn btn-block">Submit Feedback</button>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initApp();
            populateDoctorsSelect();
        });
    </script>
</body>
</html>
