<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Doctor Evaluation System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h1>Doctor Evaluation System</h1>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="feedback.html">Submit Feedback</a>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
    </nav>
    <div class="container">
        <div class="card">
            <h2>Doctor Directory</h2>
            <p style="margin-bottom: 1rem; color: var(--text-muted);">Select a doctor to view their performance report.</p>
            <div class="table-wrapper">
                <table id="doctorsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Specialization</th>
                            <th>Experience (Years)</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initApp();
            fetchDoctors();
        });
    </script>
</body>
</html>
