<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Doctor Evaluation System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="card auth-card">
            <h2 style="text-align: center; margin-bottom: 1.5rem; color: var(--primary);">System Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter username (e.g. admin)" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter password (e.g. admin123)" required>
                </div>
                <button type="submit" class="btn btn-block">Login</button>
            </form>
            <p id="loginError" style="color: red; text-align: center; margin-top: 1rem;" class="hidden"></p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
